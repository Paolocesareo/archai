<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArchAI · Consulente di automazioni condominiali</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy-dark: #0A1628; --navy: #142848; --navy-light: #1e3a5f;
    --gold: #d4a946; --gold-light: #e6c068; --gold-dark: #a8841f;
    --cream: #f7f5ef; --white: #ffffff;
    --text: #1a2332; --text-muted: #5a6478;
    --success: #2d7a4f; --warning: #c97f1e; --danger: #b54545;
    --border: #e3e0d6;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--cream); color: var(--text); line-height: 1.5;
    min-height: 100vh; padding: 24px 16px;
    display: flex; align-items: flex-start; justify-content: center;
  }
  .archai-app {
    width: 100%; max-width: 760px; background: var(--white);
    border-radius: 12px; overflow: hidden;
    box-shadow: 0 8px 32px rgba(10, 22, 40, 0.12);
    border: 1px solid var(--border);
  }
  .header {
    background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 100%);
    padding: 24px 32px; color: var(--white);
    border-bottom: 3px solid var(--gold);
  }
  .header-row {
    display: flex; align-items: center; gap: 20px;
    justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 16px; min-width: 0; flex: 1; }
  .logo-icon {
    width: 52px; height: 52px; background: var(--gold);
    border-radius: 12px; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
  }
  .logo-icon svg { width: 32px; height: 32px; }
  .titles { flex: 1; min-width: 0; }
  .title { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.1; }
  .title .ai-badge {
    background: var(--gold); color: var(--navy-dark);
    font-size: 11px; font-weight: 800; padding: 2px 7px;
    border-radius: 5px; margin-left: 6px; vertical-align: middle;
    letter-spacing: 0.5px;
  }
  .byline {
    font-size: 11px; color: var(--gold-light);
    margin-top: 4px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .byline .by-label { opacity: 0.6; margin-right: 4px; }
  .byline .by-brand { color: var(--white); font-weight: 700; letter-spacing: 0.5px; text-transform: none; font-size: 13px; }
  .subtitle { font-size: 13px; color: var(--gold-light); margin-top: 6px; font-weight: 500; }
  .header-logo-ac {
    flex-shrink: 0; height: 68px; width: auto;
    filter: drop-shadow(0 2px 8px rgba(212, 169, 70, 0.25));
  }
  .header-logo-ac img { height: 100%; width: auto; display: block; }
  .progress {
    display: flex; gap: 6px; padding: 16px 32px;
    background: var(--navy-light);
  }
  .progress-step {
    flex: 1; height: 4px; background: rgba(255, 255, 255, 0.15);
    border-radius: 2px; transition: background 0.3s;
  }
  .progress-step.active { background: var(--gold); }
  .progress-step.done { background: var(--gold-dark); }
  .content { padding: 36px 32px; min-height: 320px; }
  .step-label {
    font-size: 12px; font-weight: 700; color: var(--gold-dark);
    letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px;
  }
  .step-question {
    font-size: 22px; font-weight: 700; color: var(--navy-dark);
    margin-bottom: 8px; line-height: 1.3;
  }
  .step-hint { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
  .text-input, .text-area {
    width: 100%; padding: 14px 16px; border: 2px solid var(--border);
    border-radius: 8px; font-size: 16px; font-family: inherit;
    color: var(--text); background: var(--white); transition: border-color 0.2s;
  }
  .text-input:focus, .text-area:focus { outline: none; border-color: var(--gold); }
  .text-area { resize: vertical; min-height: 90px; line-height: 1.5; }
  .options { display: flex; flex-direction: column; gap: 12px; }
  .option {
    background: var(--white); border: 2px solid var(--border);
    border-radius: 8px; padding: 16px 18px; text-align: left;
    cursor: pointer; font-family: inherit; font-size: 15px;
    color: var(--text); transition: all 0.15s;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .option:hover { border-color: var(--gold); background: #fffdf6; transform: translateY(-1px); }
  .option-letter {
    width: 26px; height: 26px; background: var(--navy); color: var(--white);
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px; flex-shrink: 0;
  }
  .option:hover .option-letter { background: var(--gold); color: var(--navy-dark); }
  .option-text { flex: 1; padding-top: 2px; }
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 8px; padding: 14px 24px; background: var(--gold);
    color: var(--navy-dark); border: none; border-radius: 8px;
    font-family: inherit; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
  }
  .btn:hover { background: var(--gold-light); transform: translateY(-1px); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: transparent; color: var(--navy);
    border: 2px solid var(--navy);
  }
  .btn-secondary:hover { background: var(--navy); color: var(--white); }
  .btn-small { padding: 10px 16px; font-size: 13px; }
  .actions {
    margin-top: 28px; display: flex; gap: 12px;
    justify-content: space-between; align-items: center;
  }
  .principio-zero {
    background: linear-gradient(135deg, #fffdf6 0%, #fdf8e8 100%);
    border-left: 4px solid var(--gold);
    padding: 16px 18px; border-radius: 6px; margin-bottom: 24px;
  }
  .principio-zero strong {
    color: var(--gold-dark); display: block; margin-bottom: 4px;
    font-size: 13px; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .principio-zero p { font-size: 14px; color: var(--text); font-style: italic; }
  .alert { padding: 24px; border-radius: 8px; margin-bottom: 24px; }
  .alert.danger { background: #fdf0f0; border-left: 4px solid var(--danger); }
  .alert.warning { background: #fef7eb; border-left: 4px solid var(--warning); }
  .alert h3 { font-size: 18px; margin-bottom: 8px; color: var(--navy-dark); }
  .alert p { color: var(--text); font-size: 14px; }
  .scheda {
    background: var(--navy-dark); color: var(--cream);
    padding: 28px 24px; border-radius: 10px;
    font-family: 'SF Mono', Monaco, 'Courier New', monospace;
    font-size: 13px; line-height: 1.7; margin-bottom: 16px;
    border: 2px solid var(--gold); overflow-x: auto;
  }
  .scheda .header-line { color: var(--gold); text-align: center; margin-bottom: 4px; }
  .scheda .title-line {
    color: var(--gold-light); text-align: center; font-weight: 700;
    margin-bottom: 8px; letter-spacing: 1px;
  }
  .scheda .field-line { color: var(--cream); }
  .scheda .field-label { color: var(--gold-light); display: inline-block; min-width: 110px; }
  .scheda .level-l1 { color: #6dd989; font-weight: 700; }
  .scheda .level-l1p { color: #f4c95a; font-weight: 700; }
  .scheda .level-l2 { color: #ff8a65; font-weight: 700; }
  .scheda .next-steps-title { color: var(--gold); margin: 12px 0 6px; font-weight: 700; }
  .scheda .step-item { color: var(--cream); padding-left: 4px; }
  .scheda .footer-line {
    color: var(--text-muted); text-align: center;
    margin-top: 12px; font-size: 11px;
  }
  .prompt-section {
    margin-top: 24px; background: #f9f7f0;
    border: 2px dashed var(--gold); border-radius: 10px; padding: 24px;
  }
  .prompt-title {
    font-size: 14px; font-weight: 800; color: var(--gold-dark);
    letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 6px;
  }
  .prompt-subtitle {
    font-size: 13px; color: var(--text-muted);
    margin-bottom: 16px; line-height: 1.5;
  }
  .prompt-box {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 8px; padding: 18px 20px;
    font-family: 'SF Mono', Monaco, 'Courier New', monospace;
    font-size: 13px; line-height: 1.65; color: var(--text);
    white-space: pre-wrap; word-wrap: break-word;
    max-height: 360px; overflow-y: auto;
  }
  .prompt-actions {
    margin-top: 14px; display: flex; gap: 10px;
    align-items: center; flex-wrap: wrap;
  }
  .copy-feedback {
    display: inline-block; padding: 8px 14px;
    background: var(--success); color: var(--white);
    border-radius: 6px; font-size: 13px; font-weight: 600;
    opacity: 0; transition: opacity 0.2s;
  }
  .copy-feedback.show { opacity: 1; }

  /* === FIX 1: transizione visibile tra step === */
  @keyframes stepIn {
    0%   { opacity: 0; transform: translateX(24px); }
    100% { opacity: 1; transform: translateX(0); }
  }
  @keyframes stepNumPop {
    0%   { transform: scale(0.6); opacity: 0; }
    60%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .content.step-enter { animation: stepIn 0.35s ease-out; }
  .step-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 20px; padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .step-badge {
    display: flex; align-items: center; justify-content: center;
    width: 56px; height: 56px; border-radius: 14px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
    color: var(--navy-dark); font-weight: 800; font-size: 18px;
    letter-spacing: -0.5px; flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(212, 169, 70, 0.35);
    animation: stepNumPop 0.5s ease-out;
  }
  .step-badge .step-num-big { font-size: 22px; line-height: 1; }
  .step-badge .step-num-small { font-size: 11px; line-height: 1; opacity: 0.75; }
  .step-header-text { flex: 1; min-width: 0; }
  .step-header-label {
    font-size: 11px; font-weight: 800; color: var(--gold-dark);
    letter-spacing: 1.6px; text-transform: uppercase; margin-bottom: 3px;
  }
  .step-header-title {
    font-size: 20px; font-weight: 700; color: var(--navy-dark);
    line-height: 1.25;
  }
  .step-hint { font-size: 14px; color: var(--text-muted); margin-bottom: 22px; }

  /* progress più visibile */
  .progress-step { height: 6px; }
  .progress-step.active {
    background: var(--gold);
    box-shadow: 0 0 8px rgba(212, 169, 70, 0.6);
  }

  /* === FIX 2: scheda infografica === */
  .scheda-info {
    background: linear-gradient(135deg, #0a1628 0%, #142848 60%, #1e3a5f 100%);
    border: 2px solid var(--gold);
    border-radius: 14px; padding: 26px 22px;
    margin-bottom: 16px; color: var(--cream);
    box-shadow: 0 8px 24px rgba(10, 22, 40, 0.2);
  }
  .scheda-info-title {
    display: flex; align-items: center; gap: 10px;
    font-size: 16px; font-weight: 700; color: var(--gold-light);
    margin-bottom: 4px; letter-spacing: 0.3px;
  }
  .scheda-info-title .wf-name {
    color: var(--white); font-weight: 800;
  }
  .scheda-info-sub {
    font-size: 12px; color: rgba(247, 245, 239, 0.6);
    letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 20px;
  }
  .flow-diagram {
    display: grid;
    grid-template-columns: 1fr auto 1fr auto 1fr;
    gap: 10px; align-items: stretch;
    margin-bottom: 22px;
  }
  .flow-node {
    background: rgba(255, 255, 255, 0.06);
    border: 1.5px solid rgba(212, 169, 70, 0.35);
    border-radius: 10px; padding: 16px 12px;
    text-align: center; display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start; gap: 8px;
    min-height: 140px;
  }
  .flow-node.flow-process {
    background: rgba(212, 169, 70, 0.12);
    border-color: var(--gold);
  }
  .flow-icon {
    width: 44px; height: 44px; border-radius: 10px;
    background: rgba(212, 169, 70, 0.15);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .flow-process .flow-icon {
    background: var(--gold); color: var(--navy-dark);
  }
  .flow-icon svg { width: 24px; height: 24px; }
  .flow-label {
    font-size: 10px; font-weight: 800; letter-spacing: 1.2px;
    text-transform: uppercase; color: var(--gold-light);
  }
  .flow-process .flow-label { color: var(--gold); }
  .flow-desc {
    font-size: 13px; color: var(--cream); font-weight: 600;
    line-height: 1.35;
  }
  .flow-meta {
    font-size: 11px; color: rgba(247, 245, 239, 0.7);
    font-style: italic; margin-top: 2px;
  }
  .flow-arrow {
    display: flex; align-items: center; justify-content: center;
    color: var(--gold); font-size: 22px; font-weight: 700;
    padding: 0 4px;
  }
  .scheda-badges {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.3px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: var(--cream);
  }
  .badge.badge-l1 { background: rgba(109, 217, 137, 0.15); border-color: #6dd989; color: #a8e9bc; }
  .badge.badge-l1p { background: rgba(244, 201, 90, 0.15); border-color: #f4c95a; color: #f6d685; }
  .badge.badge-l2 { background: rgba(255, 138, 101, 0.15); border-color: #ff8a65; color: #ffb199; }
  .badge.badge-tool { background: rgba(212, 169, 70, 0.18); border-color: var(--gold); color: var(--gold-light); }
  .folder-paths {
    background: rgba(0, 0, 0, 0.25);
    border-radius: 8px; padding: 12px 14px;
    font-family: 'SF Mono', Monaco, 'Courier New', monospace;
    font-size: 11px; color: var(--gold-light); line-height: 1.7;
    border-left: 3px solid var(--gold);
  }
  .folder-paths .folder-label {
    color: rgba(247, 245, 239, 0.5); font-size: 9px;
    text-transform: uppercase; letter-spacing: 1px;
    display: block; margin-bottom: 2px;
  }
  .folder-paths .folder-path { color: var(--cream); }

  .next-steps-box {
    background: #f9f7f0; border-left: 4px solid var(--gold);
    border-radius: 8px; padding: 16px 18px; margin-bottom: 16px;
  }
  .next-steps-box h4 {
    font-size: 12px; color: var(--gold-dark); font-weight: 800;
    letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 10px;
  }
  .next-steps-box ol {
    list-style: none; counter-reset: step;
  }
  .next-steps-box ol li {
    counter-increment: step; padding: 6px 0 6px 32px;
    position: relative; font-size: 13px; color: var(--text);
    line-height: 1.45;
  }
  .next-steps-box ol li::before {
    content: counter(step);
    position: absolute; left: 0; top: 6px;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--gold); color: var(--navy-dark);
    font-weight: 800; font-size: 11px;
    display: flex; align-items: center; justify-content: center;
  }

  /* === FIX 3: esempi cliccabili per il passo 7 === */
  .esempi-box {
    margin-top: 18px;
    background: linear-gradient(135deg, #fffdf6 0%, #fdf8e8 100%);
    border: 1.5px dashed var(--gold);
    border-radius: 10px;
    padding: 18px 18px 14px;
  }
  .esempi-title {
    font-size: 13px; font-weight: 800; color: var(--gold-dark);
    letter-spacing: 0.3px; margin-bottom: 12px;
  }
  .esempi-list {
    display: flex; flex-direction: column; gap: 8px;
    margin-bottom: 10px;
  }
  .esempio-item {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
    text-align: left; cursor: pointer;
    font-family: inherit; width: 100%;
    transition: all 0.15s;
    display: block;
  }
  .esempio-item:hover {
    border-color: var(--gold);
    background: #fffdf6;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(212, 169, 70, 0.12);
  }
  .esempio-item.selected {
    border-color: var(--gold);
    background: #fdf8e8;
    box-shadow: 0 0 0 3px rgba(212, 169, 70, 0.2);
  }
  .esempio-label {
    font-size: 13px; font-weight: 700; color: var(--navy-dark);
    margin-bottom: 4px;
  }
  .esempio-preview {
    font-size: 12px; color: var(--text-muted);
    line-height: 1.45;
  }
  .esempi-tip {
    font-size: 11px; color: var(--text-muted);
    font-style: italic; text-align: center;
    padding-top: 6px; border-top: 1px solid rgba(212, 169, 70, 0.2);
  }

  @media (max-width: 700px) {
    .flow-diagram {
      grid-template-columns: 1fr;
      gap: 6px;
    }
    .flow-arrow { transform: rotate(90deg); padding: 2px 0; }
    .flow-node { min-height: auto; padding: 14px 10px; }
  }
  @media (max-width: 600px) {
    body { padding: 12px 8px; }
    .header { padding: 18px 16px; }
    .header-row { gap: 12px; }
    .header-logo-ac { height: 50px; }
    .logo-icon { width: 44px; height: 44px; }
    .logo-icon svg { width: 26px; height: 26px; }
    .title { font-size: 20px; }
    .byline .by-brand { font-size: 11px; }
    .subtitle { font-size: 11px; }
    .content { padding: 24px 20px; }
    .step-question { font-size: 18px; }
    .scheda { font-size: 11px; padding: 18px 14px; }
    .scheda .field-label { min-width: 90px; }
    .actions { flex-direction: column-reverse; }
    .btn { width: 100%; }
    .prompt-section { padding: 18px 14px; }
    .prompt-box { font-size: 11px; padding: 14px; }
  }
</style>
</head>
<body>
<div class="archai-app">
  <div class="header">
    <div class="header-row">
      <div class="header-left">
        <div class="logo-icon">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 4 L4 28 L11 28 L13 23 L19 23 L21 28 L28 28 Z M14.5 19 L16 14.5 L17.5 19 Z" fill="#0A1628" stroke="#0A1628" stroke-linejoin="round" stroke-width="0.5"/>
          </svg>
        </div>
        <div class="titles">
          <div class="title">Arch<span class="ai-badge">AI</span></div>
          <div class="byline"><span class="by-label">by</span><span class="by-brand">Amministratore Crescente</span></div>
          <div class="subtitle">Consulente di automazioni condominiali</div>
        </div>

function render() {
  updateProgress();
  const content = document.getElementById('content');
  // Fix 1: trigger animazione slide-in a ogni render
  content.classList.remove('step-enter');
  void content.offsetWidth; // force reflow
  content.classList.add('step-enter');
  if (state.step === 0) renderIntro(content);
  else if (state.step === 1) renderD1(content);
  else if (state.step === 2) renderD2(content);
  else if (state.step === 3) renderD3(content);
  else if (state.step === 4) renderD4(content);
  else if (state.step === 5) renderFreq(content);
  else if (state.step === 6) renderOutput(content);
  else if (state.step === 7) renderResult(content);
  else if (state.step === 'stop_d1') renderStopD1(content);
  else if (state.step === 'stop_d4') renderStopD4(content);
}

function updateProgress() {
  const steps = document.querySelectorAll('.progress-step');
  let activeIdx = (typeof state.step === 'string') ? -1 : state.step;
  steps.forEach((el, i) => {
    el.classList.remove('active', 'done');
    if (i < activeIdx) el.classList.add('done');
    else if (i === activeIdx) el.classList.add('active');
  });
}

  const wfClean = state.wfName.replace(/\s+/g, '_');

  el.innerHTML = `
    <div class="step-label">PASSO 8 DI 8 · VERDETTO</div>
    <div class="step-question">Ecco la tua scheda infografica</div>
    <div class="step-hint">Il flusso è analizzato, l'archetipo è identificato, il prompt è pronto. Da qui si parte.</div>

    <div class="scheda-info">
      <div class="scheda-info-title">📋 <span class="wf-name">${escapeHtml(state.wfName)}</span></div>
      <div class="scheda-info-sub">Scheda Workflow · Metodo ArchAI</div>

      <div class="flow-diagram">
        <div class="flow-node flow-input">
          <div class="flow-icon">${ICONS[inputIconKey] || ICONS.inputA}</div>
          <div class="flow-label">Input</div>
          <div class="flow-desc">${inputMap[state.d1] || '—'}</div>
        </div>
        <div class="flow-arrow">→</div>
        <div class="flow-node flow-process">
          <div class="flow-icon">${ICONS[archIconKey]}</div>
          <div class="flow-label">Archetipo ${arch.num}</div>
          <div class="flow-desc">${arch.nome}</div>
          <div class="flow-meta">${triggerMap[state.d3]}</div>
        </div>
        <div class="flow-arrow">→</div>
        <div class="flow-node flow-output">
          <div class="flow-icon">${ICONS[outputIconKey] || ICONS.outputA}</div>
          <div class="flow-label">Output</div>
          <div class="flow-desc">${outputMap[state.d2]}</div>
        </div>
      </div>

      <div class="scheda-badges">
        <div class="badge ${badgeClass}">${livelloLabel}</div>
        <div class="badge badge-tool">⚙️ ${arch.strumento}</div>
        <div class="badge">🕐 ${escapeHtml(state.frequenza)}</div>
      </div>

      ${archNum <= 2 ? `
      <div class="folder-paths">
        <span class="folder-label">Cartella ingresso</span>
        <span class="folder-path">/Studio/${wfClean}/in/</span><br>
        <span class="folder-label" style="margin-top:6px;">Cartella risultato</span>
        <span class="folder-path">/Studio/${wfClean}/out/</span>
      </div>
      ` : archNum === 3 ? `
      <div class="folder-paths">
        <span class="folder-label">Connettore dati</span>
        <span class="folder-path">Gmail API · bozze in "Drafts"</span>
      </div>
      ` : `
      <div class="folder-paths">
        <span class="folder-label">Stack definitivo (Parte 2)</span>
        <span class="folder-path">React + Supabase + Netlify + Claude Code</span>
      </div>
      `}
    </div>

    <div class="next-steps-box">
      <h4>→ Prossimi passi</h4>
      <ol>
        ${passi.map(p => `<li>${escapeHtml(p)}</li>`).join('')}
      </ol>
    </div>

    <div class="actions" style="margin-top:8px;">
      <button class="btn btn-secondary btn-small" onclick="restart()">↺ Nuovo workflow</button>
      <button class="btn btn-small" id="copySchedaBtn">📋 Copia scheda (testo)</button>
    </div>

    <div class="prompt-section">
      <div class="prompt-title">⚡ PROMPT OPERATIVO PRONTO</div>
      <div class="prompt-subtitle">Questo è il prompt che devi incollare in Cowork. È stato generato automaticamente sulla base delle tue risposte e segue il Metodo ArchAI. Copialo, aprilo in un nuovo task di Cowork, e l'automazione è pronta.</div>
      <div class="prompt-box" id="promptContent">${escapeHtml(promptTesto)}</div>
      <div class="prompt-actions">
        <button class="btn" id="copyPromptBtn">📋 Copia prompt operativo</button>
        <span class="copy-feedback" id="copyFeedback">Copiato!</span>
      </div>
    </div>
  `;

  const schedaText = generaSchedaText(archNum, livelloLabel, triggerMap, inputMap, outputMap, arch, passi);
  document.getElementById('copySchedaBtn').addEventListener('click', () => copyToClipboard(schedaText));
  document.getElementById('copyPromptBtn').addEventListener('click', () => copyToClipboard(promptTesto));
}

function generaSchedaText(archNum, livelloLabel, triggerMap, inputMap, outputMap, arch, passi) {
  return `═══════════════════════════════════════
  SCHEDA WORKFLOW · METODO ARCHAI
═══════════════════════════════════════
  Nome WF:    ${state.wfName}
  Archetipo:  ${arch.num} — ${arch.nome}
  Livello:    ${livelloLabel.replace(/[✓⚠✗]\s*/, '')}
  Trigger:    ${triggerMap[state.d3]}
  Frequenza:  ${state.frequenza}
  Input:      ${inputMap[state.d1] || '—'}
  Output:     ${outputMap[state.d2]}
  Strumento:  ${arch.strumento}
───────────────────────────────────────
  PROSSIMI PASSI:
${passi.map(p => '  → ' + p).join('\n')}
═══════════════════════════════════════
  — ArchAI · Amministratore Crescente`;
}

function optionHtml(letter, text) {
  return `<button class="option" data-choice="${letter}"><div class="option-letter">${letter.toUpperCase()}</div><div class="option-text">${text}</div></button>`;
}

function optionFreq(label) {
  return `<button class="option" data-freq="${escapeHtml(label)}"><div class="option-letter">›</div><div class="option-text">${label}</div></button>`;
}

function bindOptions(callback) {
  document.querySelectorAll('.option').forEach(el => {
    el.addEventListener('click', () => callback(el.dataset.choice));
  });
}

function backBtn(prevStep) {
  return `<div class="actions"><button class="btn btn-secondary" onclick="goBack(${prevStep})">← Indietro</button><div></div></div>`;
}

function goBack(step) { state.step = step; render(); }

function restart() {
  state.step = 0;
  state.wfName = '';
  state.d1 = state.d2 = state.d3 = state.d4 = null;
  state.frequenza = '';
  state.outputDesc = '';
  render();
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function copyToClipboard(text) {
  const showFeedback = () => {
    const fb = document.getElementById('copyFeedback');
    if (fb) {
      fb.classList.add('show');
      setTimeout(() => fb.classList.remove('show'), 2000);
    }
  };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(showFeedback).catch(() => fallbackCopy(text, showFeedback));
  } else {
    fallbackCopy(text, showFeedback);
  }
}

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
  cb();
}

render();
</script>
